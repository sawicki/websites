<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eberly.xyz</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f8f3ea;
        --text: #20211d;
        --muted: #6a665d;
        --line: #d8d0c0;
        --panel: #fffaf0;
        --accent: #7a4f2a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(135deg, rgba(122, 79, 42, 0.12), transparent 36%),
          linear-gradient(315deg, rgba(20, 108, 102, 0.1), transparent 40%),
          var(--bg);
        color: var(--text);
      }

      main {
        width: min(720px, 100%);
        padding: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: color-mix(in srgb, var(--panel) 92%, white);
        box-shadow: 0 18px 42px rgba(31, 34, 29, 0.12);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.3rem, 8vw, 4.4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 560px;
        margin: 20px 0 0;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.6;
      }

      .status {
        display: inline-block;
        margin-top: 28px;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--accent);
        font-size: 0.9rem;
        font-weight: 700;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #171816;
          --text: #f1eee6;
          --muted: #b8b2a4;
          --line: #3a3c35;
          --panel: #21231f;
          --accent: #d8aa7a;
        }

        main {
          box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Coming soon</p>
      <h1>eberly.xyz</h1>
      <p>
        This domain was purchased for my daughter when she married, in case she
        ever wanted a place on the web with her last name.
      </p>
      <span class="status">Reserved with love</span>
    </main>
  </body>
</html>
